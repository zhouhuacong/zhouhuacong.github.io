<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 — 海拉鲁工具箱</title>
    <link rel="stylesheet" href="css/tools.css">
    <style>
        /* ===== PASSWORD GENERATOR SPECIFIC ===== */

        .password-display {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: 18px;
            letter-spacing: 2px;
            word-break: break-all;
            min-height: 56px;
            color: var(--text-primary);
            transition: all var(--transition-normal);
            margin-bottom: 16px;
        }
        .password-display:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .password-display .pw-text {
            flex: 1;
            user-select: all;
            cursor: text;
        }
        .password-display .pw-text.placeholder {
            color: var(--text-placeholder);
            font-family: var(--font-sans);
            letter-spacing: 0;
            font-size: 14px;
        }
        .password-display .pw-copy-btn {
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color-strong);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all var(--transition-fast);
        }
        .password-display .pw-copy-btn:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
            border-color: var(--text-tertiary);
        }
        .password-display .pw-copy-btn:active {
            transform: scale(0.92);
        }
        .password-display .pw-copy-btn.copied {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Slider row */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .slider-row input[type="range"] {
            flex: 1;
        }
        .slider-row .length-value {
            font-family: var(--font-mono);
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            min-width: 42px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        /* Checkbox row */
        .charset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 24px;
        }
        @media (max-width: 480px) {
            .charset-grid {
                grid-template-columns: 1fr;
            }
        }
        .charset-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
            font-size: 14px;
            font-weight: 500;
        }
        .charset-option:hover {
            border-color: var(--accent);
        }
        .charset-option.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }
        .charset-option input[type="checkbox"] {
            display: none;
        }
        .charset-option .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid var(--border-color-strong);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: transparent;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        .charset-option.active .check-icon {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .charset-option .charset-label {
            flex: 1;
        }
        .charset-option .charset-example {
            font-size: 11px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }
        .charset-option.active .charset-example {
            color: var(--accent);
            opacity: 0.7;
        }

        /* Generate button */
        .generate-wrap {
            position: relative;
            margin-bottom: 24px;
        }
        .btn-generate {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
            color: white;
            font-family: var(--font-sans);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: -0.2px;
            position: relative;
            overflow: hidden;
        }
        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0px 4px 12px rgba(59,130,246,0.35);
        }
        .btn-generate:active {
            transform: scale(0.98);
        }
        .btn-generate.generating {
            pointer-events: none;
            opacity: 0.85;
        }
        .btn-generate .shuffle-icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .btn-generate.generating .shuffle-icon {
            animation: spin-shuffle 0.6s ease-in-out;
        }
        @keyframes spin-shuffle {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(1); }
            75% { transform: rotate(270deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Strength meter */
        .strength-section {
            margin-bottom: 24px;
        }
        .strength-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .strength-header .strength-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        .strength-header .strength-score {
            font-size: 12px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }
        .strength-meter {
            display: flex;
            gap: 6px;
        }
        .strength-bar {
            height: 6px;
            flex: 1;
            border-radius: 3px;
            background: var(--bg-tertiary);
            transition: all var(--transition-normal);
        }
        .strength-bar.active.level-0 { background: var(--error); }
        .strength-bar.active.level-1 { background: var(--warning); }
        .strength-bar.active.level-2 { background: var(--info); }
        .strength-bar.active.level-3 { background: var(--success); }

        .strength-label {
            font-size: 14px;
            font-weight: 600;
            transition: color var(--transition-normal);
        }
        .strength-label.level-0 { color: var(--error); }
        .strength-label.level-1 { color: var(--warning); }
        .strength-label.level-2 { color: var(--info); }
        .strength-label.level-3 { color: var(--success); }

        /* Stats row */
        .pw-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .pw-stat {
            text-align: center;
            padding: 12px 8px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
        .pw-stat .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .pw-stat .stat-label {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-top: 2px;
        }
        @media (max-width: 480px) {
            .pw-stats {
                grid-template-columns: repeat(3, 1fr);
            }
            .pw-stat .stat-value {
                font-size: 16px;
            }
        }

        /* History */
        .history-section {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .history-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .history-header .clear-btn {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
        }
        .history-header .clear-btn:hover {
            color: var(--error);
            background: rgba(239,68,68,0.08);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            animation: fadeIn 0.3s ease both;
        }
        .history-item .h-pw {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
            word-break: break-all;
            flex: 1;
            color: var(--text-secondary);
        }
        .history-item .h-copy {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }
        .history-item .h-copy:hover {
            color: var(--accent);
            background: var(--accent-light);
        }
        .history-empty {
            text-align: center;
            padding: 20px;
            color: var(--text-tertiary);
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== HEADER ===== -->
<header class="site-header">
    <div class="header-inner">
        <a href="/" class="header-logo">

<!-- ===== MAIN ===== -->
<main>
    <div class="container">
        <div class="tool-section">

            <!-- Breadcrumb -->
            <div class="tool-header">
                <div class="breadcrumb">
                    <a href="/">首页</a>
                    <span>›</span>
                    <span>密码生成器</span>
                </div>
                <h1>🔐 密码生成器</h1>
                <p>生成高强度、可自定义的随机密码，保护你的海拉鲁账号安全。</p>
            </div>

            <!-- Tool Card -->
            <div class="tool-card-container">
                <div class="tool-body">

                    <!-- Password Display -->
                    <div class="password-display" id="passwordDisplay">
                        <span class="pw-text placeholder" id="pwText">点击下方按钮生成密码</span>
                        <button class="pw-copy-btn" id="copyBtn" title="复制密码" aria-label="复制密码">

                    <!-- Stats -->
                    <div class="pw-stats" id="pwStats">

                        </div>
                        <div class="pw-stat">

                            <div class="stat-label">熵 (bits)</div>
                        </div>
                        <div class="pw-stat">
                            <div class="stat-value" id="statTypes">—</div>
                            <div class="stat-label">字符类型</div>
                        </div>
                    </div>

                    <!-- Strength Meter -->
                    <div class="strength-section" id="strengthSection">

                        </div>
                        <div class="strength-meter" id="strengthMeter">
                            <div class="strength-bar" data-index="0"></div>
                            <div class="strength-bar" data-index="1"></div>
                            <div class="strength-bar" data-index="2"></div>

                    <!-- Slider -->

                    <!-- Character Sets -->
                    <div class="input-group">
                        <label>字符集</label>

                            <label class="charset-option active" data-key="lowercase">
                                <input type="checkbox" checked>
                                <span class="check-icon">✓</span>
                                <span>
                                    <span class="charset-label">小写字母</span>
                                    <span class="charset-example">a b c ... z</span>
                                </span>
                            </label>
                            <label class="charset-option active" data-key="numbers">
                                <input type="checkbox" checked>
                                <span class="check-icon">✓</span>
                                <span>
                                    <span class="charset-label">数字</span>
                                    <span class="charset-example">0 1 2 ... 9</span>
                                </span>
                            </label>
                            <label class="charset-option" data-key="symbols">
                                <input type="checkbox">
                                <span class="check-icon">✓</span>
                                <span>

                    <!-- Generate Button -->
                    <div class="generate-wrap">
                        <button class="btn-generate" id="generateBtn">

                    </div>

                </div>

                <!-- Footer hints -->
                <div class="tool-footer">
                    <span class="hint">🔒 密码仅在本地生成，不会发送到服务器</span>
                    <span class="hint">至少勾选一种字符类型</span>

            </div>

            <!-- Password History -->
            <div class="tool-card-container history-section" style="margin-top:20px;border-radius:var(--radius-xl);">
                <div class="tool-body">
                    <div class="history-header">
                        <h3>📜 生成历史</h3>
                        <button class="clear-btn" id="clearHistoryBtn">清空历史</button>

        </div>

</main>

<footer class="site-footer">
    <div class="footer-inner">
        <span>© 2026 海拉鲁工具箱 · 本地工具集</span>
        <span>

            <span style="margin:0 6px;opacity:0.3;">·</span>

<script>
(function() {
    'use strict';

    // ===== DOM REFS =====
    const pwText        = document.getElementById('pwText');
    const copyBtn       = document.getElementById('copyBtn');
    const lengthSlider  = document.getElementById('lengthSlider');
    const lengthDisplay = document.getElementById('lengthDisplay');
    const generateBtn   = document.getElementById('generateBtn');
    const charsetGrid   = document.getElementById('charsetGrid');
    const strengthMeter = document.getElementById('strengthMeter');
    const strengthLabel = document.getElementById('strengthLabel');
    const strengthScore = document.getElementById('strengthScore');
    const historyList   = document.getElementById('historyList');
    const clearHistory  = document.getElementById('clearHistoryBtn');
    const toast         = document.getElementById('toast');

    const statLength  = document.getElementById('statLength');
    const statEntropy = document.getElementById('statEntropy');
    const statTypes   = document.getElementById('statTypes');

    // ===== STATE =====
    let currentPassword = '';
    let history = [];

    // ===== CONSTANTS =====
    const CHARSETS = {
        uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lowercase: 'abcdefghijklmnopqrstuvwxyz',
        numbers:   '0123456789',
        symbols:   '!@#$%^&*()_+-=[]{}|;:,.<>?/`~'
    };

    const STRENGTH_LABELS = [
        { label: 'Weak',        score: '脆弱',    className: 'level-0' },
        { label: 'Medium',      score: '一般',    className: 'level-1' },
        { label: 'Strong',      score: '强',      className: 'level-2' },
        { label: 'Very Strong', score: '非常强',  className: 'level-3' }
    ];

    // ===== HELPERS =====

    function getSelectedCharsets() {
        const options = charsetGrid.querySelectorAll('.charset-option');
        const selected = [];
        options.forEach(opt => {
            const cb = opt.querySelector('input[type="checkbox"]');
            if (cb.checked) {
                selected.push(opt.dataset.key);
            }
        });
        return selected;
    }

    function getCharacterPool() {
        const keys = getSelectedCharsets();
        if (keys.length === 0) return '';
        return keys.map(k => CHARSETS[k]).join('');
    }

    function getRandomChar(pool) {
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generatePassword() {
        const length = parseInt(lengthSlider.value, 10);
        const pool = getCharacterPool();

        if (pool.length === 0) return '';

        const selectedKeys = getSelectedCharsets();

        // Guarantee at least one char from each selected charset
        const guaranteed = [];
        selectedKeys.forEach(key => {
            const chars = CHARSETS[key];
            guaranteed.push(getRandomChar(chars));
        });

        const remaining = length - guaranteed.length;
        const password = guaranteed.slice();

        for (let i = 0; i < remaining; i++) {
            password.push(getRandomChar(pool));
        }

        return shuffleArray(password).join('');
    }

    function calculateEntropy(poolSize, length) {
        if (poolSize === 0 || length === 0) return 0;
        return Math.round(length * Math.log2(poolSize));
    }

    function evaluateStrength(password) {
        if (!password) return { level: 0, label: '—', bits: 0 };

        const len = password.length;
        let poolSize = 0;

        const keys = getSelectedCharsets();
        keys.forEach(k => { poolSize += CHARSETS[k].length; });

        const bits = calculateEntropy(poolSize, len);

        // Determine level based on entropy
        let level = 0;
        if (bits >= 80) level = 3;
        else if (bits >= 60) level = 2;
        else if (bits >= 40) level = 1;

        return { level, label: STRENGTH_LABELS[level].score, bits };
    }

    function updateStrengthUI(password) {
        const result = evaluateStrength(password);
        const bars = strengthMeter.querySelectorAll('.strength-bar');

        bars.forEach((bar, i) => {
            bar.classList.remove('active', 'level-0', 'level-1', 'level-2', 'level-3');
            if (i <= result.level) {
                bar.classList.add('active', `level-${result.level}`);
            }
        });

        strengthLabel.textContent = result.label || '密码强度';
        strengthLabel.className = 'strength-label' + (result.label ? ' ' + STRENGTH_LABELS[result.level].className : '');
        strengthScore.textContent = result.bits > 0 ? `${result.bits} bits` : '—';
    }

    function updateStats(password) {
        if (!password) {
            statLength.textContent = '—';
            statEntropy.textContent = '—';
            statTypes.textContent = '—';
            return;
        }

        const keys = getSelectedCharsets();
        let poolSize = 0;
        keys.forEach(k => { poolSize += CHARSETS[k].length; });

        statLength.textContent = password.length;
        statEntropy.textContent = calculateEntropy(poolSize, password.length);
        statTypes.textContent = keys.length;
    }

    function updateDisplay(password) {
        if (password) {
            pwText.textContent = password;
            pwText.className = 'pw-text';
            pwText.classList.remove('placeholder');
        } else {
            pwText.textContent = '点击下方按钮生成密码';
            pwText.className = 'pw-text placeholder';
        }
        currentPassword = password;
    }

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    function copyPassword() {
        if (!currentPassword) {
            showToast('没有可复制的密码');
            return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(currentPassword).then(() => {
                copyBtn.classList.add('copied');
                setTimeout(() => copyBtn.classList.remove('copied'), 1500);
                showToast('已复制!');
            }).catch(() => {
                fallbackCopy();
            });
        } else {
            fallbackCopy();
        }
    }

    function fallbackCopy() {
        const textarea = document.createElement('textarea');
        textarea.value = currentPassword;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            copyBtn.classList.add('copied');
            setTimeout(() => copyBtn.classList.remove('copied'), 1500);
            showToast('已复制!');
        } catch (e) {
            showToast('复制失败，请手动复制');
        }
        document.body.removeChild(textarea);
    }

    function addToHistory(password) {
        if (!password) return;
        // Don't add duplicate immediately if same as last
        if (history.length > 0 && history[0] === password) return;
        history.unshift(password);
        if (history.length > 5) history.pop();
        renderHistory();
        // Save to localStorage
        try {
            localStorage.setItem('pwgen_history', JSON.stringify(history));
        } catch (e) { /* ignore */ }
    }

    function renderHistory() {
        if (history.length === 0) {
            historyList.innerHTML = '<div class="history-empty">还没有生成过密码</div>';
            return;
        }

        let html = '';
        history.forEach((pw, idx) => {
            const display = pw.length > 24 ? pw.substring(0, 22) + '…' : pw;
            html += `
                <div class="history-item" style="animation-delay:${idx * 0.05}s">
                    <span class="h-pw" title="${pw.replace(/"/g, '&quot;')}">${display}</span>
                    <button class="h-copy" data-pw="${pw.replace(/"/g, '&quot;')}" title="复制此密码">📋</button>
                </div>
            `;
        });
        historyList.innerHTML = html;

        // Bind copy buttons in history
        historyList.querySelectorAll('.h-copy').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const pw = this.dataset.pw;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(pw).then(() => {
                        showToast('已复制!');
                    }).catch(() => {
                        fallbackCopyForHistory(pw);
                    });
                } else {
                    fallbackCopyForHistory(pw);
                }
            });
        });
    }

    function fallbackCopyForHistory(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            showToast('已复制!');
        } catch (e) {
            showToast('复制失败');
        }
        document.body.removeChild(textarea);
    }

    function doGenerate() {
        const keys = getSelectedCharsets();
        if (keys.length === 0) {
            showToast('请至少选择一种字符类型');
            return;
        }

        // Animate button
        generateBtn.classList.add('generating');
        const shuffleIcon = generateBtn.querySelector('.shuffle-icon');

        // Slight delay for animation effect
        setTimeout(() => {
            const password = generatePassword();
            if (password) {
                updateDisplay(password);
                updateStrengthUI(password);
                updateStats(password);
                addToHistory(password);
            }
            generateBtn.classList.remove('generating');
        }, 350);
    }

    function loadHistory() {
        try {
            const saved = localStorage.getItem('pwgen_history');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed)) {
                    history = parsed.slice(0, 5);
                }
            }
        } catch (e) { /* ignore */ }
        renderHistory();
    }

    function clearHistory() {
        history = [];
        try {
            localStorage.removeItem('pwgen_history');
        } catch (e) { /* ignore */ }
        renderHistory();
    }

    // ===== EVENT BINDING =====

    // Slider
    lengthSlider.addEventListener('input', function() {
        lengthDisplay.textContent = this.value;
        // Auto-update strength/stats if there's a current password
        if (currentPassword) {
            // If length changed, we could suggest regenerating — just update labels for now
            updateStats(currentPassword);
            updateStrengthUI(currentPassword);
        }
    });

    // Checkbox toggles
    charsetGrid.querySelectorAll('.charset-option').forEach(opt => {
        opt.addEventListener('click', function(e) {
            // Ignore clicks on the checkbox itself (it toggles naturally)
            if (e.target.tagName === 'INPUT') return;

            const cb = this.querySelector('input[type="checkbox"]');
            cb.checked = !cb.checked;
            this.classList.toggle('active', cb.checked);

            // If password exists, update stats
            if (currentPassword) {
                updateStats(currentPassword);
                updateStrengthUI(currentPassword);
            }
        });

        // Also sync with checkbox change
        const cb = opt.querySelector('input[type="checkbox"]');
        cb.addEventListener('change', function() {
            opt.classList.toggle('active', this.checked);
            if (currentPassword) {
                updateStats(currentPassword);
                updateStrengthUI(currentPassword);
            }
        });
    });

    // Generate button
    generateBtn.addEventListener('click', doGenerate);

    // Copy button
    copyBtn.addEventListener('click', copyPassword);

    // Clear history
    clearHistory.addEventListener('click', clearHistory);

    // Keyboard shortcut: Enter to generate
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.target.matches('input, textarea, button')) {
            doGenerate();
        }
    });

    // ===== LOAD STATE =====
    loadHistory();

    // Generate initial password on load
    setTimeout(() => {
        doGenerate();
    }, 100);

})();
</script>

</body>
</html>
