    <style>
        /* ===== Unit Converter Specific Styles ===== */

        .converter-panel {
            display: none;
            animation: fadeIn 0.35s ease both;
        }

        .converter-panel.active {
            display: block;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: start;
        }

        .converter-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .converter-side label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            text-transform: uppercase;
        }

        .converter-side select {
            width: 100%;
        }

        .converter-center {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 24px;
        }

        .swap-btn-main {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color-strong);
            background: var(--bg-input);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }

        .swap-btn-main:hover {
            background: var(--bg-hover);
            color: var(--accent);
            transform: rotate(180deg);
            box-shadow: var(--shadow-sm);
        }

        .swap-btn-main:active {
            transform: rotate(180deg) scale(0.92);
        }

        .converter-input-wrap {
            position: relative;
        }

        .converter-input-wrap input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: all var(--transition-fast);
        }

        .converter-input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .converter-input-wrap input::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
            font-size: 15px;
        }

        .converter-result {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            min-height: 48px;
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            position: relative;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .converter-result:hover {
            border-color: var(--accent);
        }

        .converter-result .result-unit {
            font-weight: 400;
            color: var(--text-tertiary);
            margin-left: 6px;
            font-size: 15px;
        }

        .converter-result .copy-indicator {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .converter-result:hover .copy-indicator {
            opacity: 1;
        }

        .converter-result .copied-flash {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            background: var(--success);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
        }

        .converter-result .copied-flash.show {
            opacity: 1;
        }

        .converter-details {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .converter-details .formula {
            font-size: 13px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }

        .converter-details .formula strong {
            color: var(--text-secondary);
        }

        .converter-details .copy-btn {
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .converter-details .copy-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .converter-details .copy-btn.copied {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Quick values row */
        .quick-values {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .quick-value-btn {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            font-size: 12px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quick-value-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        /* Language Switcher */
        .lang-switcher {
            position: relative;
            margin-right: 8px;
        }

        .lang-switcher select {
            appearance: none;
            -webkit-appearance: none;
            background: var(--bg-toolbar);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13px;
            padding: 4px 24px 4px 8px;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: border-color var(--transition-fast);
            outline: none;
            min-width: 60px;
        }

        .lang-switcher select:hover {
            border-color: var(--accent);
        }

        .lang-switcher select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .lang-switcher::after {
            content: '▾';
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-tertiary);
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .converter-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .converter-center {
                padding-top: 0;
            }

            .swap-btn-main {
                width: 40px;
                height: 40px;
                font-size: 18px;
                transform: rotate(90deg);
            }

            .swap-btn-main:hover {
                transform: rotate(270deg);
            }

            .swap-btn-main:active {
                transform: rotate(270deg) scale(0.92);
            }

            .converter-input-wrap input,
            .converter-result {
                font-size: 16px;
            }

            .converter-details {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .unit-tab {
                font-size: 12px;
                padding: 6px 10px;
            }

            .converter-side select {
                font-size: 13px;
            }

            .lang-switcher select {
                font-size: 11px;
                padding: 3px 20px 3px 6px;
                min-width: 44px;
            }
        }
    </style>

                    <div id="panel-mass" class="converter-panel"></div>

    </div>
</main>

        /* ============================================================
           I18N ENGINE
           ============================================================ */

        let currentLang = localStorage.getItem('converter-lang') || 'en';

        function t(key) {
            const dict = i18n[currentLang] || i18n.en;
            const keys = key.split('.');
            let val = dict;
            for (const k of keys) {
                if (val && typeof val === 'object' && k in val) {
                    val = val[k];
                } else {
                    // Fallback to English
                    let fallback = i18n.en;
                    for (const fk of keys) {
                        fallback = fallback && typeof fallback === 'object' && fk in fallback ? fallback[fk] : undefined;
                    }
                    return fallback !== undefined ? fallback : key;
                }
            }
            return val !== undefined ? val : key;
        }

        function getUnitLabel(category, unitId) {
            return t('units.' + category + '.' + unitId);
        }

        function applyTranslations() {
            // Update data-i18n elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = t(key);
            });

            // Update data-i18n-attr elements
            document.querySelectorAll('[data-i18n-attr]').forEach(el => {
                const attrDefs = el.getAttribute('data-i18n-attr').split(';');
                attrDefs.forEach(def => {
                    const [attr, key] = def.split(':');
                    if (attr && key) {
                        el.setAttribute(attr.trim(), t(key.trim()));
                    }
                });
            });

            // Update page title
            document.title = t('siteTitle');

            // Update document lang
            document.documentElement.lang = currentLang;

            // Rebuild panel labels with current language
            Object.keys(categories).forEach(cat => rebuildPanelLabels(cat));

            // Update active info
            const catData = categories[currentCategory];
            if (catData) {
                document.getElementById('activeInfo').textContent = catData.icon + ' ' + t('cat' + catData.labelKey);
            }

            // Re-run conversion to refresh formula display
            if (state[currentCategory].inputValue) {
                convert(currentCategory);
            }
        }

        function rebuildPanelLabels(category) {
            const catData = categories[category];

            // Update from/to labels
            const fromLabel = document.querySelector(`#panel-${category} .converter-side:first-child label`);
            const toLabel = document.querySelector(`#panel-${category} .converter-side:last-child label`);
            if (fromLabel) fromLabel.textContent = t('labelFrom');
            if (toLabel) toLabel.textContent = t('labelTo');

            // Update input placeholder
            const inputEl = document.getElementById('input-' + category);
            if (inputEl) inputEl.placeholder = t('placeholder');

            // Update unit options
            const fromSelect = document.getElementById('from-' + category);
            const toSelect = document.getElementById('to-' + category);
            if (fromSelect) {
                fromSelect.innerHTML = catData.units.map(u =>
                    `<option value="${u.id}">${getUnitLabel(category, u.id)}</option>`
                ).join('');
                fromSelect.value = state[category].fromUnit;
            }
            if (toSelect) {
                toSelect.innerHTML = catData.units.map(u =>
                    `<option value="${u.id}">${getUnitLabel(category, u.id)}</option>`
                ).join('');
                toSelect.value = state[category].toUnit;
            }

            // Update swap button title
            const swapBtn = document.querySelector(`.swap-btn-main[data-category="${category}"]`);
            if (swapBtn) swapBtn.title = t('swapTitle');

            // Update result container title
            const resultContainer = document.getElementById('result-' + category);
            if (resultContainer) resultContainer.title = t('resultTitle');

            // Update copied flash
            const copiedFlash = document.querySelector(`#result-${category} .copied-flash`);
            if (copiedFlash) copiedFlash.textContent = t('copiedFlash');

            // Update formula
            const formulaEl = document.getElementById('formula-' + category);
            if (formulaEl) formulaEl.innerHTML = t('formulaEmpty');

            // Update copy button
            const copyBtn = document.getElementById('copyResult-' + category);
            if (copyBtn) {
                copyBtn.title = t('copyBtnTitle');
                copyBtn.innerHTML = t('copyBtnLabel');

            if (!i18n[lang]) return;
            currentLang = lang;
            localStorage.setItem('converter-lang', lang);
            document.getElementById('langSelect').value = lang;

        /* ============================================================

        const categories = {
            length: {
                labelKey: 'Length',
                icon: '📏',
                units: [
                    { id: 'mm',      toBase: v => v / 1000 },

                    { id: 'cup',     toBase: v => v * 0.2365882365 },
                ]
            }
        };

        // Pre-compute fromBase lookups for non-temperature categories
        Object.keys(categories).forEach(cat => {
            const catData = categories[cat];
            if (!catData.fromBase) {
                catData.fromBase = {};
                catData.units.forEach(u => {
                    const basePerUnit = u.toBase(1);
                    catData.fromBase[u.id] = v => v / basePerUnit;
                });
            }
        });

        // Quick-value buttons for each category
        const quickValues = {
            length: ['1', '10', '100', '1000', '0.01', '0.3048'],
            mass: ['1', '10', '100', '1000', '0.5', '0.4536'],
            temperature: ['0', '25', '37', '100', '-40', '212'],
            area: ['1', '10', '100', '1000', '0.01', '4046.86'],
            volume: ['1', '10', '100', '1000', '0.5', '3.785'],
        };

        /* ============================================================
           STATE
           ============================================================ */

        let currentCategory = 'length';

        const state = {};
        Object.keys(categories).forEach(cat => {
            state[cat] = {
                fromUnit: categories[cat].units[0].id,
                toUnit: categories[cat].units.length > 1 ? categories[cat].units[1].id : categories[cat].units[0].id,
                inputValue: '',
            };
        });

        /* ============================================================
           DOM REFS
           ============================================================ */

        const panels = {};
        ['length', 'mass', 'temperature', 'area', 'volume'].forEach(cat => {
            panels[cat] = document.getElementById('panel-' + cat);
        });

        const tabs = document.querySelectorAll('.unit-tab');
        const activeInfo = document.getElementById('activeInfo');
        const toastEl = document.getElementById('toast');
        let toastTimer = null;

        /* ============================================================
           BUILD PANELS
           ============================================================ */

        function buildPanelHTML(category) {
            const catData = categories[category];
            const qv = quickValues[category] || ['1', '10', '100'];

            let unitOptions = catData.units.map(u =>
                `<option value="${u.id}">${getUnitLabel(category, u.id)}</option>`
            ).join('');

            let quickBtns = qv.map(v =>

            ).join('');

            return `

                </div>

        }

        Object.keys(categories).forEach(cat => {
            panels[cat].innerHTML = buildPanelHTML(cat);
        });

        /* ============================================================
           CONVERSION ENGINE
           ============================================================ */

        function convert(category) {
            const catData = categories[category];
            const st = state[category];
            const inputEl = document.getElementById('input-' + category);
            const resultValueEl = document.querySelector('#result-' + category + ' .result-value');
            const resultUnitEl = document.querySelector('#result-' + category + ' .result-unit');
            const formulaEl = document.getElementById('formula-' + category);
            const resultContainer = document.getElementById('result-' + category);

            const rawValue = inputEl.value.trim();
            if (rawValue === '') {
                resultValueEl.textContent = '—';
                resultUnitEl.textContent = '';
                formulaEl.innerHTML = t('formulaEmpty');
                return;
            }

            const numValue = parseFloat(rawValue);
            if (isNaN(numValue)) {
                resultValueEl.textContent = t('invalidInput');
                resultUnitEl.textContent = '';
                formulaEl.innerHTML = t('enterValidNumber');
                return;
            }

            const fromUnitId = st.fromUnit;
            const toUnitId = st.toUnit;

            const fromUnitObj = catData.units.find(u => u.id === fromUnitId);
            const toUnitObj = catData.units.find(u => u.id === toUnitId);
            if (!fromUnitObj || !toUnitObj) return;

            const baseValue = catData.units.find(u => u.id === fromUnitId).toBase(numValue);
            const resultValue = catData.fromBase[toUnitId](baseValue);

            let formattedResult;
            if (Math.abs(resultValue) >= 1e12 || (Math.abs(resultValue) < 1e-10 && resultValue !== 0)) {
                formattedResult = resultValue.toExponential(6);
            } else {
                const absVal = Math.abs(resultValue);
                let decimals;
                if (absVal >= 1000) decimals = 2;
                else if (absVal >= 1) decimals = 4;
                else if (absVal >= 0.01) decimals = 6;
                else decimals = 8;
                formattedResult = Number(resultValue.toFixed(decimals)).toString();
            }

            resultValueEl.textContent = formattedResult;
            resultUnitEl.textContent = getUnitLabel(category, toUnitId).replace(/^[^(]+\\(/, '').replace(/\\)$/, '');

            // Formula display
            const fromLabel = getUnitLabel(category, fromUnitId).replace(/\\(.*\\)/, '').trim();
            const toLabel = getUnitLabel(category, toUnitId).replace(/\\(.*\\)/, '').trim();
            const rate = catData.fromBase[toUnitId](catData.units.find(u => u.id === fromUnitId).toBase(1));
            formulaEl.innerHTML = `<strong>${fromLabel}</strong> → <strong>${toLabel}</strong>：1 ${fromUnitId} = ${rate.toFixed(6)} ${toUnitId}`;
        }

        /* ============================================================
           EVENT BINDING
           ============================================================ */

        function bindEvents(category) {
            const inputEl = document.getElementById('input-' + category);
            const fromSelect = document.getElementById('from-' + category);
            const toSelect = document.getElementById('to-' + category);
            const swapBtn = document.querySelector(`.swap-btn-main[data-category="${category}"]`);
            const resultContainer = document.getElementById('result-' + category);
            const copyBtn = document.getElementById('copyResult-' + category);
            const quickBtns = document.querySelectorAll(`#panel-${category} .quick-value-btn`);

            // Input
            if (inputEl) {
                inputEl.addEventListener('input', function () {
                    state[category].inputValue = this.value;
                    convert(category);
                });
            }

            // From unit change
            if (fromSelect) {
                fromSelect.addEventListener('change', function () {
                    state[category].fromUnit = this.value;
                    convert(category);
                });
            }

            // To unit change
            if (toSelect) {
                toSelect.addEventListener('change', function () {
                    state[category].toUnit = this.value;
                    convert(category);
                });
            }

            // Swap
            if (swapBtn) {
                swapBtn.addEventListener('click', function () {
                    const st = state[category];
                    const fromSelect = document.getElementById('from-' + category);
                    const toSelect = document.getElementById('to-' + category);

                    const temp = st.fromUnit;
                    st.fromUnit = st.toUnit;
                    st.toUnit = temp;

                    if (fromSelect) fromSelect.value = st.fromUnit;
                    if (toSelect) toSelect.value = st.toUnit;

                    convert(category);
                });
            }

            // Click result to copy
            if (resultContainer) {
                resultContainer.addEventListener('click', function () {
                    const valueEl = this.querySelector('.result-value');
                    const unitEl = this.querySelector('.result-unit');
                    const text = (valueEl.textContent + ' ' + unitEl.textContent).trim();
                    if (text && text !== '—') {
                        copyToClipboard(text, category, this);
                    }
                });
            }

            // Copy button
            if (copyBtn) {
                copyBtn.addEventListener('click', function () {
                    const valueEl = document.querySelector(`#result-${category} .result-value`);
                    const unitEl = document.querySelector(`#result-${category} .result-unit`);
                    const text = (valueEl.textContent + ' ' + unitEl.textContent).trim();
                    if (text && text !== '—') {
                        copyToClipboard(text, category, null, this);
                    }
                });
            }

            // Quick value buttons
            quickBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    const val = this.getAttribute('data-value');
                    if (inputEl) {
                        inputEl.value = val;
                        state[category].inputValue = val;
                        convert(category);
                    }
                });
            });
        }

        // Bind events for all categories
        Object.keys(categories).forEach(cat => bindEvents(cat));

        /* ============================================================
           TAB SWITCHING
           ============================================================ */

        tabs.forEach(tab => {
            tab.addEventListener('click', function () {
                const category = this.getAttribute('data-category');
                if (category === currentCategory) return;

                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                Object.keys(panels).forEach(cat => {
                    panels[cat].classList.remove('active');
                });

                panels[category].classList.add('active');
                currentCategory = category;

                const catData = categories[category];
                activeInfo.textContent = catData.icon + ' ' + t('cat' + catData.labelKey);

                if (state[category].inputValue) {
                    convert(category);
                } else {
                    // Update empty formula text
                    const formulaEl = document.getElementById('formula-' + category);
                    if (formulaEl) formulaEl.innerHTML = t('formulaEmpty');
                }
            });
        });

        /* ============================================================
           CLIPBOARD / TOAST
           ============================================================ */

        function copyToClipboard(text, category, resultEl, btnEl) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast(t('copiedToast') + text);
                    flashCopied(resultEl, btnEl);
                }).catch(() => {
                    fallbackCopy(text, resultEl, btnEl);
                });
            } else {
                fallbackCopy(text, resultEl, btnEl);
            }
        }

        function fallbackCopy(text, resultEl, btnEl) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast(t('copiedToast') + text);
                flashCopied(resultEl, btnEl);
            } catch (e) {
                showToast(t('copyFailedToast'));
            }
            document.body.removeChild(textarea);
        }

        function flashCopied(resultEl, btnEl) {
            if (resultEl) {
                const flash = resultEl.querySelector('.copied-flash');
                if (flash) {
                    flash.textContent = t('copiedFlash');
                    flash.classList.add('show');
                    setTimeout(() => flash.classList.remove('show'), 1200);
                }
            }
            if (btnEl) {
                btnEl.classList.add('copied');
                setTimeout(() => btnEl.classList.remove('copied'), 1200);
            }
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2200);
        }

        /* ============================================================
           THEME TOGGLE (with localStorage persistence)
           ============================================================ */

        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('converter-theme');
        let isDark;

        if (savedTheme !== null) {
            isDark = savedTheme === 'dark';
        } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        function applyTheme(dark) {
            if (dark) {
                document.documentElement.classList.add('dark');
                themeToggle.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeToggle.textContent = '🌙';
            }
            localStorage.setItem('converter-theme', dark ? 'dark' : 'light');
        }

        applyTheme(isDark);

        themeToggle.addEventListener('click', function () {
            isDark = !isDark;
            applyTheme(isDark);
        });

        // Listen for system changes (only if no saved preference)
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMedia.addEventListener('change', function (e) {
            if (localStorage.getItem('converter-theme') === null) {
                isDark = e.matches;
                applyTheme(isDark);
            }
        });

        /* ============================================================
           DARK MODE: toggle class on <html> to override
           ============================================================ */

        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            html.dark {
                --bg-primary: #0a0a0b;
                --bg-secondary: #111113;
                --bg-tertiary: #18181b;
                --bg-card: #111113;
                --bg-input: #18181b;
                --bg-hover: #27272a;
                --bg-toolbar: #18181b;
                --text-primary: #fafafa;
                --text-secondary: #a1a1aa;
                --text-tertiary: #71717a;
                --text-placeholder: #52525b;
                --text-inverse: #0a0a0b;
                --border-color: rgba(255, 255, 255, 0.08);
                --border-color-strong: rgba(255, 255, 255, 0.12);
                --shadow-sm: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 2px 4px rgba(0,0,0,0.2), 0px 8px 16px -8px rgba(0,0,0,0.3);
                --shadow-lg: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 4px 8px rgba(0,0,0,0.2), 0px 16px 24px -8px rgba(0,0,0,0.4);
                --accent: #3b82f6;
                --accent-hover: #60a5fa;
                --accent-light: rgba(59, 130, 246, 0.1);
            }

            html:not(.dark) {
                --bg-primary: #ffffff;
                --bg-secondary: #fafafa;
                --bg-tertiary: #f5f5f5;
                --bg-card: #ffffff;
                --bg-input: #ffffff;
                --bg-hover: #f0f0f0;
                --bg-toolbar: #fafafa;
                --text-primary: #171717;
                --text-secondary: #4d4d4d;
                --text-tertiary: #808080;
                --text-placeholder: #a0a0a0;
                --text-inverse: #ffffff;
                --border-color: rgba(0, 0, 0, 0.08);
                --border-color-strong: rgba(0, 0, 0, 0.12);
                --shadow-sm: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 1px 2px rgba(0,0,0,0.04);
                --shadow-md: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 2px 4px rgba(0,0,0,0.04), 0px 8px 16px -8px rgba(0,0,0,0.06);
                --shadow-lg: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 4px 8px rgba(0,0,0,0.04), 0px 16px 24px -8px rgba(0,0,0,0.08);
                --accent: #0072f5;
                --accent-hover: #005cc9;
                --accent-light: #ebf5ff;
            }
        `;
        document.head.appendChild(styleSheet);

        /* ============================================================
           LANGUAGE SWITCHER
           ============================================================ */

        const langSelect = document.getElementById('langSelect');
        langSelect.value = currentLang;

        langSelect.addEventListener('change', function () {
            setLanguage(this.value);
        });

        /* ============================================================
           SET DEFAULT UNITS & INITIAL CONVERSION
           ============================================================ */

        Object.keys(categories).forEach(cat => {
            const units = categories[cat].units;
            if (units.length > 1) {
                state[cat].toUnit = units[1].id;
            }
            const fromSelect = document.getElementById('from-' + cat);
            const toSelect = document.getElementById('to-' + cat);
            if (fromSelect) fromSelect.value = state[cat].fromUnit;
            if (toSelect) toSelect.value = state[cat].toUnit;
        });

        // Default value for length
        state.length.inputValue = '1';
        const lenInput = document.getElementById('input-length');
        if (lenInput) {
            lenInput.value = '1';
            convert('length');
        }

        // Apply initial language
        applyTranslations();

        console.log('✅ Unit Converter initialized (i18n-' + currentLang + ')');

    })();
</script>
</body>
</html>
