<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位换算 — 在线工具</title>
    <link rel="stylesheet" href="css/tools.css">
    <style>
        /* ===== Unit Converter Specific Styles ===== */

        .converter-panel {
            display: none;
            animation: fadeIn 0.35s ease both;
        }

        .converter-panel.active {
            display: block;
        }

        .converter-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: start;
        }

        .converter-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .converter-side label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: -0.2px;
            text-transform: uppercase;
        }

        .converter-side select {
            width: 100%;
        }

        .converter-center {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 24px;
        }

        .swap-btn-main {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color-strong);
            background: var(--bg-input);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }

        .swap-btn-main:hover {
            background: var(--bg-hover);
            color: var(--accent);
            transform: rotate(180deg);
            box-shadow: var(--shadow-sm);
        }

        .swap-btn-main:active {
            transform: rotate(180deg) scale(0.92);
        }

        .converter-input-wrap {
            position: relative;
        }

        .converter-input-wrap input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 18px;
            font-weight: 600;
            outline: none;
            transition: all var(--transition-fast);
        }

        .converter-input-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .converter-input-wrap input::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
            font-size: 15px;
        }

        .converter-result {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            min-height: 48px;
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-all;
            position: relative;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .converter-result:hover {
            border-color: var(--accent);
        }

        .converter-result .result-unit {
            font-weight: 400;
            color: var(--text-tertiary);
            margin-left: 6px;
            font-size: 15px;
        }

        .converter-result .copy-indicator {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .converter-result:hover .copy-indicator {
            opacity: 1;
        }

        .converter-result .copied-flash {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            background: var(--success);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
        }

        .converter-result .copied-flash.show {
            opacity: 1;
        }

        .converter-details {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .converter-details .formula {
            font-size: 13px;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }

        .converter-details .formula strong {
            color: var(--text-secondary);
        }

        .converter-details .copy-btn {
            font-size: 13px;
            padding: 6px 14px;
            border: 1px solid var(--border-color-strong);
            border-radius: var(--radius-md);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .converter-details .copy-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .converter-details .copy-btn.copied {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        /* Quick values row */
        .quick-values {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .quick-value-btn {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            font-size: 12px;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .quick-value-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .converter-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .converter-center {
                padding-top: 0;
            }

            .swap-btn-main {
                width: 40px;
                height: 40px;
                font-size: 18px;
                transform: rotate(90deg);
            }

            .swap-btn-main:hover {
                transform: rotate(270deg);
            }

            .swap-btn-main:active {
                transform: rotate(270deg) scale(0.92);
            }

            .converter-input-wrap input,
            .converter-result {
                font-size: 16px;
            }

            .converter-details {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            .unit-tab {
                font-size: 12px;
                padding: 6px 10px;
            }

            .converter-side select {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
    <div class="header-inner">
        <a href="/" class="header-logo">
            <span class="logo-icon">◇</span>
            <span>在线工具</span>
        </a>
        <nav class="header-nav">
            <a href="/"><span>🏠</span> 首页</a>
            <a href="#" class="active"><span>📐</span> 单位换算</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
    </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main>
    <div class="container">
        <section class="tool-section">
            <!-- Breadcrumb -->
            <div class="tool-header">
                <div class="breadcrumb">
                    <a href="/">首页</a>
                    <span>/</span>
                    <span>单位换算</span>
                </div>
                <h1>📏 单位换算</h1>
                <p>长度、重量、温度、面积、体积 — 实时换算，一键复制结果</p>
            </div>

            <!-- Tool Card -->
            <div class="tool-card-container">
                <div class="tool-body">

                    <!-- Category Tabs -->
                    <div class="unit-tabs" role="tablist">
                        <button class="unit-tab active" data-category="length" role="tab">📏 长度</button>
                        <button class="unit-tab" data-category="mass" role="tab">⚖️ 重量</button>
                        <button class="unit-tab" data-category="temperature" role="tab">🌡️ 温度</button>
                        <button class="unit-tab" data-category="area" role="tab">📐 面积</button>
                        <button class="unit-tab" data-category="volume" role="tab">🧪 体积</button>
                    </div>

                    <!-- Converter Panels -->
                    <div id="panel-length" class="converter-panel active"></div>
                    <div id="panel-mass" class="converter-panel"></div>
                    <div id="panel-temperature" class="converter-panel"></div>
                    <div id="panel-area" class="converter-panel"></div>
                    <div id="panel-volume" class="converter-panel"></div>

                </div>
                <div class="tool-footer">
                    <span class="hint">💡 点击结果区域可直接复制</span>
                    <span class="hint" id="activeInfo">📏 长度单位</span>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
    <div class="footer-inner">
        <span>&copy; 2026 在线工具</span>
        <span>
            <a href="/">首页</a>
            <span style="margin:0 6px;opacity:0.3;">·</span>
            <span>单位换算</span>
        </span>
    </div>
</footer>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== JAVASCRIPT ===== -->
<script>
    (function () {
        'use strict';

        /* ============================================================
           UNIT DEFINITIONS
           ============================================================ */

        const categories = {
            length: {
                label: '长度',
                icon: '📏',
                units: [
                    { id: 'mm',      label: '毫米 (mm)',       toBase: v => v / 1000 },
                    { id: 'cm',      label: '厘米 (cm)',       toBase: v => v / 100 },
                    { id: 'm',       label: '米 (m)',          toBase: v => v },
                    { id: 'km',      label: '千米 (km)',       toBase: v => v * 1000 },
                    { id: 'inch',    label: '英寸 (in)',       toBase: v => v * 0.0254 },
                    { id: 'foot',    label: '英尺 (ft)',       toBase: v => v * 0.3048 },
                    { id: 'yard',    label: '码 (yd)',          toBase: v => v * 0.9144 },
                    { id: 'mile',    label: '英里 (mi)',       toBase: v => v * 1609.344 },
                ]
            },
            mass: {
                label: '重量',
                icon: '⚖️',
                units: [
                    { id: 'mg',      label: '毫克 (mg)',       toBase: v => v / 1e6 },
                    { id: 'g',       label: '克 (g)',          toBase: v => v / 1000 },
                    { id: 'kg',      label: '千克 (kg)',       toBase: v => v },
                    { id: 'ton',     label: '吨 (t)',          toBase: v => v * 1000 },
                    { id: 'lb',      label: '磅 (lb)',         toBase: v => v * 0.45359237 },
                    { id: 'oz',      label: '盎司 (oz)',       toBase: v => v * 0.028349523125 },
                ]
            },
            temperature: {
                label: '温度',
                icon: '🌡️',
                units: [
                    { id: 'c',       label: '摄氏度 (°C)',     toBase: v => v },
                    { id: 'f',       label: '华氏度 (°F)',     toBase: v => (v - 32) * 5 / 9 },
                    { id: 'k',       label: '开尔文 (K)',      toBase: v => v - 273.15 },
                ],
                // Temperature conversion uses base = °C
                fromBase: {
                    c: v => v,
                    f: v => v * 9 / 5 + 32,
                    k: v => v + 273.15,
                }
            },
            area: {
                label: '面积',
                icon: '📐',
                units: [
                    { id: 'mm2',     label: '平方毫米 (mm²)',  toBase: v => v / 1e6 },
                    { id: 'cm2',     label: '平方厘米 (cm²)',  toBase: v => v / 10000 },
                    { id: 'm2',      label: '平方米 (m²)',     toBase: v => v },
                    { id: 'km2',     label: '平方千米 (km²)',  toBase: v => v * 1e6 },
                    { id: 'ha',      label: '公顷 (ha)',       toBase: v => v * 10000 },
                    { id: 'acre',    label: '英亩 (acre)',     toBase: v => v * 4046.8564224 },
                    { id: 'ft2',     label: '平方英尺 (ft²)',  toBase: v => v * 0.09290304 },
                ]
            },
            volume: {
                label: '体积',
                icon: '🧪',
                units: [
                    { id: 'ml',      label: '毫升 (mL)',       toBase: v => v / 1000 },
                    { id: 'l',       label: '升 (L)',          toBase: v => v },
                    { id: 'm3',      label: '立方米 (m³)',     toBase: v => v * 1000 },
                    { id: 'gal',     label: '加仑 (gal)',      toBase: v => v * 3.785411784 },
                    { id: 'floz',    label: '液盎司 (fl oz)',  toBase: v => v * 0.0295735295625 },
                    { id: 'cup',     label: '杯 (cup)',        toBase: v => v * 0.2365882365 },
                ]
            }
        };

        // Pre-compute fromBase lookups for non-temperature categories
        Object.keys(categories).forEach(cat => {
            const catData = categories[cat];
            if (!catData.fromBase) {
                catData.fromBase = {};
                catData.units.forEach(u => {
                    const basePerUnit = u.toBase(1); // how many base units in 1 of this unit
                    catData.fromBase[u.id] = v => v / basePerUnit;
                });
            }
        });

        // Quick-value buttons for each category
        const quickValues = {
            length: ['1', '10', '100', '1000', '0.01', '0.3048'],
            mass: ['1', '10', '100', '1000', '0.5', '0.4536'],
            temperature: ['0', '25', '37', '100', '-40', '212'],
            area: ['1', '10', '100', '1000', '0.01', '4046.86'],
            volume: ['1', '10', '100', '1000', '0.5', '3.785'],
        };

        /* ============================================================
           STATE
           ============================================================ */

        // currentCategory tracks active category key
        let currentCategory = 'length';

        // Per-category state
        const state = {};
        Object.keys(categories).forEach(cat => {
            state[cat] = {
                fromUnit: categories[cat].units[0].id,
                toUnit: categories[cat].units.length > 1 ? categories[cat].units[1].id : categories[cat].units[0].id,
                inputValue: '',
            };
        });

        /* ============================================================
           DOM REFS
           ============================================================ */

        const panels = {};
        ['length', 'mass', 'temperature', 'area', 'volume'].forEach(cat => {
            panels[cat] = document.getElementById('panel-' + cat);
        });

        const tabs = document.querySelectorAll('.unit-tab');
        const activeInfo = document.getElementById('activeInfo');
        const toastEl = document.getElementById('toast');
        let toastTimer = null;

        /* ============================================================
           BUILD PANELS
           ============================================================ */

        function buildPanelHTML(category) {
            const catData = categories[category];
            const qv = quickValues[category] || ['1', '10', '100'];

            let unitOptions = catData.units.map(u =>
                `<option value="${u.id}">${u.label}</option>`
            ).join('');

            let quickBtns = qv.map(v =>
                `<button class="quick-value-btn" data-value="${v}">${v}</button>`
            ).join('');

            return `
                <div class="converter-grid" data-category="${category}">
                    <!-- From side -->
                    <div class="converter-side">
                        <label for="from-${category}">从</label>
                        <select id="from-${category}" class="from-unit">${unitOptions}</select>
                        <div class="converter-input-wrap">
                            <input type="text" id="input-${category}" class="converter-input"
                                   placeholder="输入数值" inputmode="decimal" autocomplete="off">
                        </div>
                        <div class="quick-values">${quickBtns}</div>
                    </div>

                    <!-- Swap button -->
                    <div class="converter-center">
                        <button class="swap-btn-main" title="交换单位" data-category="${category}">↔</button>
                    </div>

                    <!-- To side -->
                    <div class="converter-side">
                        <label for="to-${category}">到</label>
                        <select id="to-${category}" class="to-unit">${unitOptions}</select>
                        <div class="converter-result" id="result-${category}" title="点击复制结果">
                            <span class="result-value">—</span>
                            <span class="result-unit"></span>
                            <span class="copy-indicator">📋</span>
                            <span class="copied-flash">✓ 已复制</span>
                        </div>
                    </div>
                </div>

                <div class="converter-details">
                    <span class="formula" id="formula-${category}">输入数值开始换算</span>
                    <button class="copy-btn" id="copyResult-${category}" title="复制换算结果">📋 复制结果</button>
                </div>
            `;
        }

        Object.keys(categories).forEach(cat => {
            panels[cat].innerHTML = buildPanelHTML(cat);
        });

        /* ============================================================
           CONVERSION ENGINE
           ============================================================ */

        function convert(category) {
            const catData = categories[category];
            const st = state[category];
            const inputEl = document.getElementById('input-' + category);
            const resultValueEl = document.querySelector('#result-' + category + ' .result-value');
            const resultUnitEl = document.querySelector('#result-' + category + ' .result-unit');
            const formulaEl = document.getElementById('formula-' + category);
            const resultContainer = document.getElementById('result-' + category);

            const rawValue = inputEl.value.trim();
            if (rawValue === '') {
                resultValueEl.textContent = '—';
                resultUnitEl.textContent = '';
                formulaEl.textContent = '输入数值开始换算';
                return;
            }

            const numValue = parseFloat(rawValue);
            if (isNaN(numValue)) {
                resultValueEl.textContent = '无效输入';
                resultUnitEl.textContent = '';
                formulaEl.textContent = '请输入有效的数字';
                return;
            }

            const fromUnitId = st.fromUnit;
            const toUnitId = st.toUnit;

            // Find unit labels
            const fromUnitObj = catData.units.find(u => u.id === fromUnitId);
            const toUnitObj = catData.units.find(u => u.id === toUnitId);
            if (!fromUnitObj || !toUnitObj) return;

            // Convert: value -> base -> target
            const baseValue = catData.units.find(u => u.id === fromUnitId).toBase(numValue);
            const resultValue = catData.fromBase[toUnitId](baseValue);

            // Format the result
            let formattedResult;
            if (Math.abs(resultValue) >= 1e12 || (Math.abs(resultValue) < 1e-10 && resultValue !== 0)) {
                formattedResult = resultValue.toExponential(6);
            } else {
                // Smart rounding
                const absVal = Math.abs(resultValue);
                let decimals;
                if (absVal >= 1000) decimals = 2;
                else if (absVal >= 1) decimals = 4;
                else if (absVal >= 0.01) decimals = 6;
                else decimals = 8;
                formattedResult = Number(resultValue.toFixed(decimals)).toString();
            }

            resultValueEl.textContent = formattedResult;
            resultUnitEl.textContent = toUnitObj.label.replace(/^[^(]+\(/, '').replace(/\)$/, '');

            // Formula display
            const fromLabel = fromUnitObj.label.replace(/\(.*\)/, '').trim();
            const toLabel = toUnitObj.label.replace(/\(.*\)/, '').trim();
            formulaEl.innerHTML = `<strong>${fromLabel}</strong> → <strong>${toLabel}</strong>：1 ${fromUnitId} = ${(catData.fromBase[toUnitId](catData.units.find(u => u.id === fromUnitId).toBase(1))).toFixed(6)} ${toUnitId}`;
        }

        /* ============================================================
           EVENT BINDING
           ============================================================ */

        function bindEvents(category) {
            const inputEl = document.getElementById('input-' + category);
            const fromSelect = document.getElementById('from-' + category);
            const toSelect = document.getElementById('to-' + category);
            const swapBtn = document.querySelector(`.swap-btn-main[data-category="${category}"]`);
            const resultContainer = document.getElementById('result-' + category);
            const copyBtn = document.getElementById('copyResult-' + category);
            const quickBtns = document.querySelectorAll(`#panel-${category} .quick-value-btn`);

            // Input
            if (inputEl) {
                inputEl.addEventListener('input', function () {
                    state[category].inputValue = this.value;
                    convert(category);
                });
            }

            // From unit change
            if (fromSelect) {
                fromSelect.addEventListener('change', function () {
                    state[category].fromUnit = this.value;
                    convert(category);
                });
            }

            // To unit change
            if (toSelect) {
                toSelect.addEventListener('change', function () {
                    state[category].toUnit = this.value;
                    convert(category);
                });
            }

            // Swap
            if (swapBtn) {
                swapBtn.addEventListener('click', function () {
                    const st = state[category];
                    const fromSelect = document.getElementById('from-' + category);
                    const toSelect = document.getElementById('to-' + category);

                    // Swap units in state
                    const temp = st.fromUnit;
                    st.fromUnit = st.toUnit;
                    st.toUnit = temp;

                    // Update selects
                    if (fromSelect) fromSelect.value = st.fromUnit;
                    if (toSelect) toSelect.value = st.toUnit;

                    convert(category);
                });
            }

            // Click result to copy
            if (resultContainer) {
                resultContainer.addEventListener('click', function () {
                    const valueEl = this.querySelector('.result-value');
                    const unitEl = this.querySelector('.result-unit');
                    const text = (valueEl.textContent + ' ' + unitEl.textContent).trim();
                    if (text && text !== '—') {
                        copyToClipboard(text, category, this);
                    }
                });
            }

            // Copy button
            if (copyBtn) {
                copyBtn.addEventListener('click', function () {
                    const valueEl = document.querySelector(`#result-${category} .result-value`);
                    const unitEl = document.querySelector(`#result-${category} .result-unit`);
                    const text = (valueEl.textContent + ' ' + unitEl.textContent).trim();
                    if (text && text !== '—') {
                        copyToClipboard(text, category, null, this);
                    }
                });
            }

            // Quick value buttons
            quickBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    const val = this.getAttribute('data-value');
                    if (inputEl) {
                        inputEl.value = val;
                        state[category].inputValue = val;
                        convert(category);
                    }
                });
            });
        }

        // Bind events for all categories
        Object.keys(categories).forEach(cat => bindEvents(cat));

        /* ============================================================
           TAB SWITCHING
           ============================================================ */

        tabs.forEach(tab => {
            tab.addEventListener('click', function () {
                const category = this.getAttribute('data-category');
                if (category === currentCategory) return;

                // Deactivate all tabs
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                // Hide all panels
                Object.keys(panels).forEach(cat => {
                    panels[cat].classList.remove('active');
                });

                // Show selected panel
                panels[category].classList.add('active');
                currentCategory = category;

                // Update info
                const catData = categories[category];
                activeInfo.textContent = catData.icon + ' ' + catData.label + '单位';

                // Run conversion for active panel
                if (state[category].inputValue) {
                    convert(category);
                }
            });
        });

        /* ============================================================
           CLIPBOARD / TOAST
           ============================================================ */

        function copyToClipboard(text, category, resultEl, btnEl) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('✓ 已复制: ' + text);
                    flashCopied(resultEl, btnEl);
                }).catch(() => {
                    fallbackCopy(text, resultEl, btnEl);
                });
            } else {
                fallbackCopy(text, resultEl, btnEl);
            }
        }

        function fallbackCopy(text, resultEl, btnEl) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✓ 已复制: ' + text);
                flashCopied(resultEl, btnEl);
            } catch (e) {
                showToast('❌ 复制失败');
            }
            document.body.removeChild(textarea);
        }

        function flashCopied(resultEl, btnEl) {
            // Flash on result
            if (resultEl) {
                const flash = resultEl.querySelector('.copied-flash');
                if (flash) {
                    flash.classList.add('show');
                    setTimeout(() => flash.classList.remove('show'), 1200);
                }
            }
            // Flash on button
            if (btnEl) {
                btnEl.classList.add('copied');
                setTimeout(() => btnEl.classList.remove('copied'), 1200);
            }
        }

        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2200);
        }

        /* ============================================================
           THEME TOGGLE
           ============================================================ */

        const themeToggle = document.getElementById('themeToggle');
        let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // Initialize
        if (isDark) {
            document.documentElement.classList.add('dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', function () {
            isDark = !isDark;
            if (isDark) {
                document.documentElement.classList.add('dark');
                this.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                this.textContent = '🌙';
            }
        });

        /* ============================================================
           DARK MODE: toggle class on <html> to override prefers-color-scheme
           ============================================================ */

        // Listen for system changes
        const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
        darkModeMedia.addEventListener('change', function (e) {
            // Only auto-switch if user hasn't manually toggled
            if (!localStorage.getItem('theme-manual')) {
                isDark = e.matches;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    themeToggle.textContent = '☀️';
                } else {
                    document.documentElement.classList.remove('dark');
                    themeToggle.textContent = '🌙';
                }
            }
        });

        // Persist manual theme
        themeToggle.addEventListener('click', function () {
            localStorage.setItem('theme-manual', 'true');
        });

        // Add dark class support: force dark mode when .dark is on html
        // The tools.css uses prefers-color-scheme: dark, but we override by inlining
        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            html.dark {
                --bg-primary: #0a0a0b;
                --bg-secondary: #111113;
                --bg-tertiary: #18181b;
                --bg-card: #111113;
                --bg-input: #18181b;
                --bg-hover: #27272a;
                --bg-toolbar: #18181b;
                --text-primary: #fafafa;
                --text-secondary: #a1a1aa;
                --text-tertiary: #71717a;
                --text-placeholder: #52525b;
                --text-inverse: #0a0a0b;
                --border-color: rgba(255, 255, 255, 0.08);
                --border-color-strong: rgba(255, 255, 255, 0.12);
                --shadow-sm: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 1px 2px rgba(0,0,0,0.2);
                --shadow-md: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 2px 4px rgba(0,0,0,0.2), 0px 8px 16px -8px rgba(0,0,0,0.3);
                --shadow-lg: 0px 0px 0px 1px rgba(255,255,255,0.06), 0px 4px 8px rgba(0,0,0,0.2), 0px 16px 24px -8px rgba(0,0,0,0.4);
                --accent: #3b82f6;
                --accent-hover: #60a5fa;
                --accent-light: rgba(59, 130, 246, 0.1);
            }

            html:not(.dark) {
                --bg-primary: #ffffff;
                --bg-secondary: #fafafa;
                --bg-tertiary: #f5f5f5;
                --bg-card: #ffffff;
                --bg-input: #ffffff;
                --bg-hover: #f0f0f0;
                --bg-toolbar: #fafafa;
                --text-primary: #171717;
                --text-secondary: #4d4d4d;
                --text-tertiary: #808080;
                --text-placeholder: #a0a0a0;
                --text-inverse: #ffffff;
                --border-color: rgba(0, 0, 0, 0.08);
                --border-color-strong: rgba(0, 0, 0, 0.12);
                --shadow-sm: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 1px 2px rgba(0,0,0,0.04);
                --shadow-md: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 2px 4px rgba(0,0,0,0.04), 0px 8px 16px -8px rgba(0,0,0,0.06);
                --shadow-lg: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 4px 8px rgba(0,0,0,0.04), 0px 16px 24px -8px rgba(0,0,0,0.08);
                --accent: #0072f5;
                --accent-hover: #005cc9;
                --accent-light: #ebf5ff;
            }
        `;
        document.head.appendChild(styleSheet);

        /* ============================================================
           SET DEFAULT UNITS & INITIAL CONVERSION
           ============================================================ */

        // Set default "to" unit to second unit in each category
        Object.keys(categories).forEach(cat => {
            const units = categories[cat].units;
            if (units.length > 1) {
                state[cat].toUnit = units[1].id;
            }
            // Set from select values
            const fromSelect = document.getElementById('from-' + cat);
            const toSelect = document.getElementById('to-' + cat);
            if (fromSelect) fromSelect.value = state[cat].fromUnit;
            if (toSelect) toSelect.value = state[cat].toUnit;
        });

        // Default value for length
        state.length.inputValue = '1';
        const lenInput = document.getElementById('input-length');
        if (lenInput) {
            lenInput.value = '1';
            convert('length');
        }

        console.log('✅ Unit Converter initialized');

    })();
</script>
</body>
</html>
