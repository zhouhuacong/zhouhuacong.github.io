<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyrule Toolbox</title>
<meta http-equiv="refresh" content="0;url=https://tools.zhczlx.com/">
<link rel="canonical" href="https://tools.zhczlx.com/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0b;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }
  .card {
    max-width: 400px;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p { font-size: 14px; color: #a1a1aa; margin-bottom: 20px; }
  a {
    color: #3b82f6;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  a:hover { text-decoration: underline; }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <h1>Redirecting to Hyrule Toolbox</h1>
  <div class="spinner"></div>
  <p style="margin-top:16px">If you are not redirected automatically, <a href="https://tools.zhczlx.com/">click here</a>.</p>
</div>
<script>window.location.replace('https://tools.zhczlx.com/');</script>
</body>
</html>
